services:
  migrate:
    volumes:
      - ./service:/app

  test:
    volumes:
      - ./service:/app

  service:
    volumes:
      - ./service:/app
    # Overrides the full CMD from the Dockerfile to add --reload (dev only).
    # --reload watches the filesystem and automatically restarts uvicorn when source files change,
    # enabling live code updates without rebuilding the image (made possible by the volume mount above).
    # Docker Compose replaces the entire command, so the base args must be repeated here.
    # The Dockerfile CMD (without --reload) remains the prod default when this override is not loaded.
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
