services:
  postgres:
    image: postgres:16-alpine
    container_name: arcane-legion-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - arcane_legion_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build: ./service
    container_name: arcane-legion-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  test:
    build: ./service
    container_name: arcane-legion-test
    command: ["python", "-m", "pytest", ".", "-v"]
    environment:
      - "DATABASE_URL=sqlite:///:memory:"
    restart: "no"

  service:
    build: ./service
    container_name: arcane-legion-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      migrate:
        condition: service_completed_successfully
      test:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  arcane_legion_postgres_data:
