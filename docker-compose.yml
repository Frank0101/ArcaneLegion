services:
  postgres:
    image: postgres:16-alpine
    container_name: arcane-legion-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=arcane
      - POSTGRES_PASSWORD=arcane
      - POSTGRES_DB=arcane_legion
    volumes:
      - arcane_legion_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcane -d arcane_legion"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build: ./service
    container_name: arcane-legion-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+psycopg://arcane:arcane@postgres:5432/arcane_legion
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  test:
    build: ./service
    container_name: arcane-legion-test
    command: ["python", "-m", "pytest", ".", "-v"]
    environment:
      - DATABASE_URL=postgresql+psycopg://arcane:arcane@postgres:5432/arcane_legion
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  service:
    build: ./service
    container_name: arcane-legion-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://arcane:arcane@postgres:5432/arcane_legion
    depends_on:
      migrate:
        condition: service_completed_successfully
      test:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  arcane_legion_postgres_data:
