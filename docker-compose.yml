services:
  test:
    build: ./service
    container_name: arcane-legion-test
    command: ["python", "-m", "pytest", "test/", "-v"]
    restart: "no"

  service:
    build: ./service
    container_name: arcane-legion-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      test:
        condition: service_completed_successfully
